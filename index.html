<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Momo+Signature&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="panel-window.css" />
    <title>Panel Window</title>
  </head>
  <body>
    <header></header>
    <main>
      <section class="panel-window-container">
        <div class="panel panel1">
          <h1>
            <span>Untamed</span>
            <span>Wild</span>
            <span>Spirit</span>
          </h1>
        </div>
        <div class="panel panel2">
          <h1>
            <span>Pure</span>
            <span>Breath Taking</span>
            <span>Awe</span>
          </h1>
        </div>
        <div class="panel panel3">
          <h1>
            <span>Silent</span>
            <span>Alone</span>
            <span>Peace</span>
          </h1>
        </div>
        <div class="panel panel4">
          <h1>
            <span>Electric</span>
            <span>Adrenaline</span>
            <span>Rush</span>
          </h1>
        </div>
        <div class="panel panel5">
          <h1>
            <span>Raw</span>
            <span>Nature</span>
            <span>Beauty</span>
          </h1>
        </div>
      </section>
    </main>
    <footer></footer>
    <script type="module" src="panelWindow.js"></script>
  </body>
</html>
